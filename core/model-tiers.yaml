# Model Tier Definitions (REFERENCE ONLY)
#
# NOT used by the build pipeline. Agent specs use direct model names
# (e.g., `# Model: opus`) and adapters pass them through without lookup.
#
# This file documents the intended model mapping per provider for future
# multi-platform adapter work. When adapters for Cursor/Codex are added,
# this file can be reactivated with proper testing.
#
# Original purpose: maps abstract performance tiers to provider-specific
# model identifiers.

tiers:
  reasoning:
    description: "Complex planning, architecture synthesis, verification, and judgment calls"
    providers:
      claude: opus
      openai: o3
      google: gemini-2.5-pro
    default_for:
      - planner
      - verifier
      - mapper-lead

  standard:
    description: "Code execution, following well-defined specs, structured exploration"
    providers:
      claude: sonnet
      openai: gpt-4.1
      google: gemini-2.5-flash
    default_for:
      - executor
      - mapper-specialist

  fast:
    description: "Mechanical checks, simple lookups, structural validation"
    providers:
      claude: haiku
      openai: gpt-4.1-mini
      google: gemini-2.5-flash-lite
    default_for:
      - checker

# Cost guidance (from NFR-002):
# Opus usage should stay below 20% of total agent calls per phase.
# See skills/mpf/references/model-routing.md for detailed cost analysis.
